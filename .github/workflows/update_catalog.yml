name: Weekly Catalog Update

on:
  schedule:
    # 21:30 UTC on Saturday = 3:00 AM IST on Sunday
    - cron: '30 21 * * 6'
  workflow_dispatch: # This adds a manual "Run" button on GitHub so you can test it anytime

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' 
          
      - name: Install dependencies
        run: pip install -r requirements.txt
          
      - name: Run Update Script
        run: python update_catalog.py 
        
      - name: Commit and Push
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git add data/course_catalog.json
          git commit -m "Automated 3 AM Catalog Update" || echo "No changes to commit"
          git push